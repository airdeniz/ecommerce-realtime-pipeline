name: ecommerce
version: "1.0.0"
config-version: 2

profile: ecommerce

model-paths: ["models"]
test-paths: ["tests"]

# Iceberg JDBC catalog'da namespace otomatik olusmuyor; ilk run'dan once acikca
# yaratiyoruz. IF NOT EXISTS oldugu icin sonraki run'larda no-op.
on-run-start:
  - "CREATE NAMESPACE IF NOT EXISTS lakehouse.silver"
  - "CREATE NAMESPACE IF NOT EXISTS lakehouse.gold"
  # ML feature tables (built by dbt) and ML model outputs (written by the
  # spark-submit ML jobs) live in their own namespaces; the JDBC catalog won't
  # auto-create them.
  - "CREATE NAMESPACE IF NOT EXISTS lakehouse.ml_features"
  - "CREATE NAMESPACE IF NOT EXISTS lakehouse.ml"

models:
  ecommerce:
    staging:
      # Staging views default Spark catalog'da kalir; her dbt run'da yeniden
      # olusturulduklari icin (DROP/CREATE VIEW) thrift restart'i sorun degil.
      +materialized: view
      +schema: staging
    core:
      # Silver tablolari Iceberg JDBC catalog'unda -> thrift restart'ina dayanikli,
      # ACID, time travel. Schema 'lakehouse.silver' three-part name uretir.
      +materialized: table
      +file_format: iceberg
      +schema: lakehouse.silver
    mart:
      # Gold tablolari da Iceberg'de.
      +materialized: table
      +file_format: iceberg
      +schema: lakehouse.gold
    ml_features:
      # ML feature store: silver-derived feature tables consumed by the
      # spark-submit ML jobs. Materialized as Iceberg tables in their own
      # namespace so they are versioned, testable and rebuildable like the marts.
      +materialized: table
      +file_format: iceberg
      +schema: lakehouse.ml_features