version: 2

models:
  - name: core_orders
    description: >
      Business-ready orders, enriched with user attributes. All lifecycle
      statuses are kept (CREATED, PAID, CANCELLED). Deleted source rows are
      retained with is_deleted = true (soft delete) rather than dropped.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_users')
              field: user_id
      - name: status
        description: Order lifecycle status.
        data_tests:
          - not_null
          - accepted_values:
              values: ['CREATED', 'PAID', 'CANCELLED']
      - name: is_deleted
        description: >
          True when the most recent event for this order was a Debezium delete
          (op = 'd'). Soft delete — the row is kept for audit/history.
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]
      - name: paid_amount
        description: total_amount when PAID, else 0.
        data_tests:
          - not_null
      - name: is_cancelled
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]

  - name: core_order_items
    description: Order lines enriched with product attributes and line totals.
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: order_id
        description: >
          Parent order in stg_orders.
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
              # Bagimsiz streaming akislari arasinda kuyruk gecikmesi beklenir;
              # uyari ver, sadece yapisal kirilmada (>500) hata ver.
              config:
                warn_if: ">0"
                error_if: ">500"
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: line_total
        description: quantity * unit_price.
        data_tests:
          - not_null
      - name: is_deleted
        description: >
          True when the most recent event for this line was a delete (op = 'd').
          Soft delete — kept for audit, excluded from sales marts.
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]
