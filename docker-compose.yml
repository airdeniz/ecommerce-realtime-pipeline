services:
  postgres:
    image: postgres:16
    container_name: ecom-postgres
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: ecom-kafka
    ports:
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  connect:
    image: quay.io/debezium/connect:2.6
    container_name: ecom-connect
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      GROUP_ID: "connect-cluster"
      CONFIG_STORAGE_TOPIC: "connect_configs"
      OFFSET_STORAGE_TOPIC: "connect_offsets"
      STATUS_STORAGE_TOPIC: "connect_statuses"
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1

  console:
    image: docker.redpanda.com/redpandadata/console:v2.6.0
    container_name: ecom-console
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_BROKERS: "kafka:9092"
      CONNECT_ENABLED: "true"
      CONNECT_CLUSTERS_NAME: "debezium"
      CONNECT_CLUSTERS_URL: "http://connect:8083"

  generator:
    build: ./generator
    container_name: ecom-generator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_DSN: ${PG_DSN}

  stock-monitor:
    build: ./stock-monitor
    container_name: ecom-stock-monitor
    depends_on:
      kafka:
        condition: service_healthy
      connector-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INVENTORY_TOPIC: ecom.public.inventory
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-10}

  connector-init:
    image: curlimages/curl:8.6.0
    container_name: ecom-connector-init
    depends_on:
      connect:
        condition: service_started
    volumes:
      - ./debezium/register-postgres.json:/register-postgres.json
      - ./debezium/register-connector.sh:/register-connector.sh
    entrypoint: ["/bin/sh", "/register-connector.sh"]
    restart: "no"

  minio-init:
    image: minio/mc:latest
    container_name: ecom-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/lakehouse &&
      echo 'Bucket ready'
      "
    restart: "no"

  pyspark:
    build: ./pyspark
    container_name: ecom-pyspark
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      iceberg-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      connector-init:
        condition: service_completed_successfully
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ICEBERG_DB_USER: ${ICEBERG_DB_USER}
      ICEBERG_DB_PASSWORD: ${ICEBERG_DB_PASSWORD}
      ICEBERG_DB_NAME: ${ICEBERG_DB_NAME}
    command: /opt/spark/bin/spark-submit /app/orders_stream.py

  spark-thrift:
    build: ./pyspark
    container_name: ecom-spark-thrift
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
      iceberg-db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "10000:10000"
      - "4041:4040"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ICEBERG_DB_USER: ${ICEBERG_DB_USER}
      ICEBERG_DB_PASSWORD: ${ICEBERG_DB_PASSWORD}
      ICEBERG_DB_NAME: ${ICEBERG_DB_NAME}
    command: >
      bash -c "/opt/spark/sbin/start-thriftserver.sh
      --driver-memory 2g
      --driver-java-options -XX:TieredStopAtLevel=1
      --conf spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
      --conf spark.sql.catalog.lakehouse=org.apache.iceberg.spark.SparkCatalog
      --conf spark.sql.catalog.lakehouse.catalog-impl=org.apache.iceberg.jdbc.JdbcCatalog
      --conf spark.sql.catalog.lakehouse.uri=jdbc:postgresql://iceberg-db:5432/$${ICEBERG_DB_NAME}
      --conf spark.sql.catalog.lakehouse.jdbc.user=$${ICEBERG_DB_USER}
      --conf spark.sql.catalog.lakehouse.jdbc.password=$${ICEBERG_DB_PASSWORD}
      --conf spark.sql.catalog.lakehouse.warehouse=s3a://lakehouse/
      --conf spark.hadoop.fs.s3a.endpoint=http://minio:9000
      --conf spark.hadoop.fs.s3a.access.key=$${MINIO_ROOT_USER}
      --conf spark.hadoop.fs.s3a.secret.key=$${MINIO_ROOT_PASSWORD}
      --conf spark.hadoop.fs.s3a.path.style.access=true
      --conf spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem
      && tail -f /opt/spark/logs/*"

  minio:
    image: minio/minio:latest
    container_name: ecom-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  superset:
    build: ./superset
    container_name: ecom-superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://superset:superset@superset-db:5432/superset
    depends_on:
      superset-db:
        condition: service_healthy

  airflow-db:
    image: postgres:16
    container_name: ecom-airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    build: ./airflow
    container_name: ecom-airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
    command: >
      bash -c "airflow db migrate && airflow users create
      --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD}
      --firstname Admin --lastname User
      --role Admin --email admin@example.com"
    restart: "no"

  airflow-webserver:
    build: ./airflow
    container_name: ecom-airflow-webserver
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./ml:/opt/airflow/ml
    command: airflow webserver

  airflow-scheduler:
    build: ./airflow
    container_name: ecom-airflow-scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Passed through to the ML jobs' local SparkSession (Iceberg JDBC catalog +
      # MinIO/S3a), matching what the pyspark service uses.
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      ICEBERG_DB_USER: ${ICEBERG_DB_USER}
      ICEBERG_DB_PASSWORD: ${ICEBERG_DB_PASSWORD}
      ICEBERG_DB_NAME: ${ICEBERG_DB_NAME}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./dbt:/opt/airflow/dbt
      - ./ml:/opt/airflow/ml
    command: airflow scheduler

  superset-db:
    image: postgres:16
    container_name: ecom-superset-db
    environment:
      POSTGRES_USER: superset
      POSTGRES_PASSWORD: superset
      POSTGRES_DB: superset
    volumes:
      - superset_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superset"]
      interval: 5s
      timeout: 5s
      retries: 10

  iceberg-db:
    image: postgres:16
    container_name: ecom-iceberg-db
    environment:
      POSTGRES_USER: ${ICEBERG_DB_USER}
      POSTGRES_PASSWORD: ${ICEBERG_DB_PASSWORD}
      POSTGRES_DB: ${ICEBERG_DB_NAME}
    volumes:
      - iceberg_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ICEBERG_DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # MCP server: lakehouse'u bir AI agent'a (Claude Desktop) acar.
  # Container surekli ayakta durur; Claude Desktop "docker exec -i ecom-mcp-server
  # python server.py" ile stdio modunda baglanir. Server, Spark Thrift uzerinden
  # bronze/silver/gold tablolarina SALT-OKUMA SQL atar.
  mcp-server:
    build: ./mcp-server
    container_name: ecom-mcp-server
    depends_on:
      spark-thrift:
        condition: service_started
    environment:
      THRIFT_HOST: spark-thrift
      THRIFT_PORT: "10000"
      LAKEHOUSE_CATALOG: lakehouse

volumes:
  minio_data:
  airflow_db_data:
  superset_db_data:
  kafka_data:
  iceberg_db_data: